MODEL:
  META_ARCHITECTURE: "GeneralizedRCNN"
  BACKBONE:
    NAME: "build_vgg_backbone"
  RPN:
    IN_FEATURES: ["vgg4"]
  # RPN:
  #   PRE_NMS_TOPK_TEST: 6000
  #   POST_NMS_TOPK_TEST: 1000
  ROI_HEADS:
    NAME: "StandardROIHeads"
    NUM_CLASSES: 9
    IN_FEATURES: ["vgg4"]
DATASETS:
  TRAIN: ("coco_2017_train",)
  TEST: ("fetus_4c_hos2_test",)
SOLVER:
  IMS_PER_BATCH: 16
  BASE_LR: 0.02
  STEPS: (60000, 80000)
  MAX_ITER: 90000
INPUT:
  MIN_SIZE_TRAIN: (600,)
VERSION: 2
